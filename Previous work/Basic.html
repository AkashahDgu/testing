<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Walking Simulator (Collision Fixed)</title>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.2.0/dist/aframe-extras.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/n5ro/aframe-physics-system@v4.0.1/dist/aframe-physics-system.min.js"></script>
  </head>
  <body>
    <a-scene fog="type: linear; color: #87CEEB; near: 20; far: 100" physics="debug: true; gravity: -9.8">
      
      <a-assets>
        <a-asset-item id="gymModel" src="Gym.glb"></a-asset-item>
      </a-assets>

      <a-sky color="#87CEEB"></a-sky>

      <a-plane position="0 0 -20" rotation="-90 0 0" width="100" height="100" color="#567d46" shadow static-body></a-plane>

      <a-box 
        position="0 5 -20" 
        width="15" 
        height="10" 
        depth="15" 
        static-body 
        visible="false">
      </a-box>

      <a-entity id="rig" 
        movement-controls="speed: 0.5"
        kinematic-body="radius: 0.6"
        position="0 0.1 5">
        <a-entity camera position="0 1.6 0" look-controls></a-entity>
        <a-entity hand-tracking-controls="hand: left"></a-entity>
        <a-entity hand-tracking-controls="hand: right"></a-entity>
      </a-entity>

      <a-entity
        gltf-model="#gymModel"
        position="0 -0.5 -20"
        scale="0.1 0.1 0.1">
      </a-entity>

      <a-entity light="type: ambient; intensity: 0.6; color: #bbb"></a-entity>
      <a-entity light="type: directional; intensity: 0.9; castShadow: true" position="-20 50 20"></a-entity>

    </a-scene>
  </body>
</html>
