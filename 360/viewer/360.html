<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Campus 360 Viewer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: #000; font-family: 'Segoe UI', sans-serif; }
        #container { width: 100%; height: 100%; }
        
        .zoom-controls {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            display: flex; align-items: center; gap: 15px;
            background: rgba(20, 20, 20, 0.8);
            backdrop-filter: blur(10px);
            padding: 10px 20px; border-radius: 50px;
            border: 1px solid rgba(255,255,255,0.1);
            z-index: 10;
        }

        .zoom-controls button {
            background: rgba(255,255,255,0.1); border: none; color: #fff;
            width: 32px; height: 32px; cursor: pointer; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; transition: background 0.2s;
        }

        .zoom-controls button:hover { background: rgba(255,255,255,0.3); }
        .zoom-label { color: #fff; font-size: 14px; min-width: 30px; text-align: center; }

        input[type=range] { -webkit-appearance: none; width: 150px; height: 4px; background: rgba(255,255,255,0.2); border-radius: 2px; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%; background: #fff; cursor: pointer; }

        #close-btn { position: absolute; top: 20px; right: 20px; background: rgba(0,0,0,0.5); color: white; border: none; border-radius: 50%; width: 30px; height: 30px; cursor: pointer; z-index: 100; }
    </style>
</head>
<body>

    <div id="container"></div>

    <div class="zoom-controls">
        <button id="zoom-out" title="Zoom Out">−</button>
        <input id="zoom-range" type="range" min="0" max="100" step="1" value="30">
        <button id="zoom-in" title="Zoom In">+</button>
        <div class="zoom-label" id="zoom-value">30</div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const container = document.getElementById('container');
        const scene = new THREE.Scene();
        
        // Start with a middle-ground FOV
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 0.1);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.outputColorSpace = THREE.SRGBColorSpace;
        container.appendChild(renderer.domElement);

        // 360 Sphere
        const geometry = new THREE.SphereGeometry(500, 60, 40);
        geometry.scale(-1, 1, 1);
        const texture = new THREE.TextureLoader().load('image.jpg');
        texture.colorSpace = THREE.SRGBColorSpace;
        const material = new THREE.MeshBasicMaterial({ map: texture });
        scene.add(new THREE.Mesh(geometry, material));

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableZoom = false; // Disable default so it doesn't fight our code
        controls.rotateSpeed = -0.5;

        // --- NEW LOGIC: Mapping UI (0-100) to Camera FOV (100-30) ---
        const zoomInBtn = document.getElementById('zoom-in');
        const zoomOutBtn = document.getElementById('zoom-out');
        const zoomRange = document.getElementById('zoom-range');
        const zoomValue = document.getElementById('zoom-value');

        function applyZoom(uiValue) {
            uiValue = Math.max(0, Math.min(100, uiValue));
            
            // Linear Mapping: 
            // UI 0   => FOV 100 (Wide)
            // UI 100 => FOV 30  (Zoomed)
            const newFov = 100 - (uiValue * 0.7); 
            
            camera.fov = newFov;
            camera.updateProjectionMatrix();

            // Sync UI
            zoomRange.value = uiValue;
            zoomValue.textContent = Math.round(uiValue);
        }

        // Initialize at 30% zoom intensity
        applyZoom(30);

        zoomRange.addEventListener('input', (e) => applyZoom(parseFloat(e.target.value)));
        
        // Zoom In button increases the intensity
        zoomInBtn.addEventListener('click', () => applyZoom(parseFloat(zoomRange.value) + 10));
        
        // Zoom Out button decreases the intensity
        zoomOutBtn.addEventListener('click', () => applyZoom(parseFloat(zoomRange.value) - 10));

        // Mouse wheel: Scroll Up to Zoom In, Down to Zoom Out
        container.addEventListener('wheel', (e) => {
            e.preventDefault();
            const delta = e.deltaY > 0 ? -5 : 5;
            applyZoom(parseFloat(zoomRange.value) + delta);
        }, { passive: false });

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
